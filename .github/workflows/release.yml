name: release

# Tag-triggered release. Push a tag like `v0.2.0` to build self-contained
# single-file binaries for every supported platform and publish them as a
# GitHub Release. The version stamped into the build is the tag minus its
# leading `v`.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build & release (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: build + release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build single-file binaries
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          mkdir -p dist
          for rid in linux-x64 linux-arm linux-arm64 osx-x64 osx-arm64 win-x64; do
            echo "::group::publish $rid"
            dotnet publish src/Packet.Term/Packet.Term.csproj -c Release -r "$rid" --self-contained \
              -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
              -p:DebugType=none -p:DebugSymbols=false \
              -p:Version="$VERSION" -p:InformationalVersion="$VERSION" \
              -o "publish/$rid"
            if [ "$rid" = "win-x64" ]; then
              mv "publish/$rid/Packet.Term.exe" "dist/packet-term-$TAG-$rid.exe"
            else
              mv "publish/$rid/Packet.Term" "dist/packet-term-$TAG-$rid"
            fi
            echo "::endgroup::"
          done
          ls -la dist

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" dist/* \
            --title "Packet.Term ${{ steps.tag.outputs.tag }}" \
            --generate-notes
